<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FM150 小区扫描</title><link rel="stylesheet" href="css/bootstrap.min.css"></head><body><main class="container my-4">
<nav class="navbar navbar-expand-lg"><a class="navbar-brand h4" href="/">FM150 模块管理</a><div class="navbar-nav ms-3"><a class="nav-link" href="/">首页</a><a class="nav-link" href="/network.html">网络</a><a class="nav-link active" href="/scanner.html">扫描</a><a class="nav-link" href="/settings.html">设置</a><a class="nav-link" href="/sms.html">短信</a><a class="nav-link" href="/fm150.html">FM150 AT</a><a class="nav-link" href="/console">终端</a><a class="nav-link" href="/deviceinfo.html">设备信息</a></div></nav>
<div id="notice" class="alert alert-secondary mt-4">点击“扫描”后才会向 FM150 发出一条 <code>AT+GTCCINFO?</code>。</div>
<div class="card"><div class="card-header d-flex justify-content-between"><span>FM150 服务与邻区</span><button id="scan" class="btn btn-outline-primary btn-sm">扫描</button></div><div class="card-body"><div class="table-responsive"><table class="table"><thead><tr><th>类型</th><th>MCC/MNC</th><th>TAC / 小区</th><th>PCI</th><th>频点</th></tr></thead><tbody id="cells"><tr><td colspan="5" class="text-muted">尚未扫描</td></tr></tbody></table></div></div></div>
<div class="card mt-3"><div class="card-header">原始 GTCCINFO 返回</div><pre class="card-body mb-0" id="raw">尚未扫描</pre></div>
</main><script>
(()=>{const $=id=>document.getElementById(id),ep='/cgi-bin/fm150_at';let busy=false;const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));const dec=v=>/^[0-9a-f]+$/i.test(v)?parseInt(v,16):v;
async function scan(){if(busy)return;busy=true;$('scan').disabled=true;$('notice').textContent='正在读取 FM150 服务与邻区…';try{const r=await fetch(ep+'?'+new URLSearchParams({atcmd:'AT+GTCCINFO?'}),{cache:'no-store'}),out=await r.text();$('raw').textContent=out.trim();if(/ERROR|timeout/i.test(out))throw Error('AT 查询未完成');const kind=/NR service cell/i.test(out)?'NR 5G':/LTE service cell/i.test(out)?'LTE 4G':'未知';const rows=out.split(/\r?\n/).filter(x=>/^\d+,/.test(x.trim())).map((row,i)=>{const f=row.trim().split(',');return `<tr><td>${i?'邻区':kind}</td><td>${esc((f[2]||'')+(f[3]||''))}</td><td>${esc(i?'—':(f[4]||'未知')+' / '+dec(f[6]||''))}</td><td>${esc(dec(f[7]||''))}</td><td>${esc(f[8]||'未知')}</td></tr>`});$('cells').innerHTML=rows.length?rows.join(''):'<tr><td colspan="5">未返回可解析的小区数据</td></tr>';$('notice').textContent='扫描完成。'}catch(e){$('notice').textContent='扫描失败：'+e.message+'。请稍后重试。'}finally{busy=false;$('scan').disabled=false}}
$('scan').onclick=scan})();
</script></body></html>

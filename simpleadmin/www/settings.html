<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FM150 设置</title><link rel="stylesheet" href="css/bootstrap.min.css"></head><body><main class="container my-4">
<nav class="navbar navbar-expand-lg"><a class="navbar-brand h4" href="/">FM150 模块管理</a><div class="navbar-nav ms-3"><a class="nav-link" href="/">首页</a><a class="nav-link" href="/network.html">网络</a><a class="nav-link" href="/scanner.html">扫描</a><a class="nav-link active" href="/settings.html">设置</a><a class="nav-link" href="/sms.html">短信</a><a class="nav-link" href="/fm150.html">FM150 AT</a><a class="nav-link" href="/console">终端</a><a class="nav-link" href="/deviceinfo.html">设备信息</a></div></nav>
<div id="notice" class="alert alert-secondary mt-4">选择一个操作后才会发送 AT 指令。</div>
<div class="row g-3"><div class="col-lg-6"><section class="card h-100"><div class="card-header">网络制式</div><div class="card-body"><p class="text-muted">使用 <code>AT+GTACT</code>。更改后模组将重新注册网络。</p><div class="d-flex flex-wrap gap-2"><button class="btn btn-outline-primary cmd" data-cmd="AT+GTACT=2">仅 4G</button><button class="btn btn-outline-primary cmd" data-cmd="AT+GTACT=14">仅 5G</button><button class="btn btn-primary cmd" data-cmd="AT+GTACT=20">自动搜索</button></div></div></section></div>
<div class="col-lg-6"><section class="card h-100"><div class="card-header">SIM 卡</div><div class="card-body"><div class="d-flex flex-wrap gap-2"><button class="btn btn-outline-secondary cmd" data-cmd="AT+GTDUALSIM=0">切换到 SIM 卡 1</button><button class="btn btn-outline-secondary cmd" data-cmd="AT+GTDUALSIM=1">切换到 SIM 卡 2</button><button class="btn btn-outline-secondary cmd" data-cmd="AT+CPIN?">查询 SIM 状态</button></div></div></section></div>
<div class="col-lg-6"><section class="card h-100"><div class="card-header">USB / ECM</div><div class="card-body"><div class="d-flex flex-wrap gap-2"><button class="btn btn-outline-secondary cmd" data-cmd="AT+GTUSBMODE?">查询 USB 模式</button><button class="btn btn-outline-success cmd" data-cmd="AT+GTRNDIS=1,1">连接 ECM</button><button class="btn btn-outline-danger cmd" data-cmd="AT+GTRNDIS=0,1">断开 ECM</button></div></div></section></div>
<div class="col-lg-6"><section class="card h-100"><div class="card-header">未提供的移远专用设置</div><div class="card-body text-muted">IP Passthrough、QMAP DNS Proxy、QCFG usbnet、TTL 和 QNW 锁频没有已确认的 FM150 等价 AT 指令，因此本页不会发送这些移远专用命令。</div></section></div></div>
<div class="card mt-3"><div class="card-header">操作结果</div><pre class="card-body mb-0" id="result">尚未执行操作</pre></div>
</main><script>
(()=>{const ep='/cgi-bin/fm150_at',$=id=>document.getElementById(id);let busy=false;async function run(cmd){if(busy)return;busy=true;$('notice').textContent='正在执行：'+cmd;$('result').textContent='';try{const r=await fetch(ep+'?'+new URLSearchParams({atcmd:cmd}),{cache:'no-store'}),out=await r.text();$('result').textContent=out.trim();$('notice').textContent=/ERROR|timeout/i.test(out)?'操作未完成，请稍后重试。':'操作完成。'}catch(e){$('notice').textContent='操作失败：'+e.message}finally{busy=false}}document.querySelectorAll('.cmd').forEach(b=>b.onclick=()=>run(b.dataset.cmd))})();
</script></body></html>

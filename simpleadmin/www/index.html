<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FM150 模块管理</title><link rel="stylesheet" href="css/bootstrap.min.css"><link rel="stylesheet" href="css/styles.css">
<style>.metric{min-height:175px}.metric-value{font-size:clamp(2rem,5vw,3.5rem);font-weight:700}pre{white-space:pre-wrap}</style>
</head><body><main class="container my-4">
<nav class="navbar navbar-expand-lg mb-4"><a class="navbar-brand h4 mb-0" href="/">FM150 模块管理</a><div class="navbar-nav ms-3"><a class="nav-link active" href="/">首页</a><a class="nav-link" href="/network.html">网络</a><a class="nav-link" href="/sms.html">短信</a><a class="nav-link" href="/fm150.html">FM150 AT</a><a class="nav-link" href="/console">终端</a></div><button id="refresh" class="btn btn-outline-primary ms-auto">刷新</button></nav>
<div id="notice" class="alert alert-secondary py-2">正在读取 FM150 状态…</div>
<section class="row g-3">
<div class="col-6 col-lg-3"><div class="card metric text-center"><div class="card-body"><div class="metric-value" id="temperature">-- °C</div></div><div class="card-footer">模块温度</div></div></div>
<div class="col-6 col-lg-3"><div class="card metric text-center"><div class="card-body"><div class="metric-value" id="simStatus">未知</div></div><div class="card-footer">SIM 卡状态</div></div></div>
<div class="col-6 col-lg-3"><div class="card metric text-center"><div class="card-body"><div class="metric-value" id="signal">--</div></div><div class="card-footer">信号强度</div></div></div>
<div class="col-6 col-lg-3"><div class="card metric text-center"><div class="card-body"><div class="metric-value" id="connection">未知</div></div><div class="card-footer">网络状态</div></div></div>
</section>
<section class="row g-3 mt-1">
<div class="col-lg-6"><div class="card h-100"><div class="card-header">网络信息</div><div class="card-body p-0"><table class="table table-striped mb-0"><tbody>
<tr><th>运营商</th><td id="operator">未知</td></tr><tr><th>MCC/MNC</th><td id="mccmnc">未知</td></tr><tr><th>APN</th><td id="apn">未知</td></tr><tr><th>网络模式</th><td id="rat">未知</td></tr><tr><th>IPv4</th><td id="ipv4">--</td></tr><tr><th>在线时长</th><td id="uptime">未知</td></tr>
</tbody></table></div></div></div>
<div class="col-lg-6"><div class="card h-100"><div class="card-header">服务小区（FM150）</div><div class="card-body p-0"><table class="table table-striped mb-0"><tbody>
<tr><th>小区类型</th><td id="cellType">未知</td></tr><tr><th>TAC</th><td id="tac">未知</td></tr><tr><th>小区 ID</th><td id="cellId">未知</td></tr><tr><th>PCI</th><td id="pci">未知</td></tr><tr><th>频点</th><td id="arfcn">未知</td></tr><tr><th>CSQ</th><td id="csq">未知</td></tr>
</tbody></table></div></div></div>
</section>
<section class="card mt-3"><div class="card-header d-flex justify-content-between"><span>原始 FM150 小区信息</span><span id="updated"></span></div><pre class="card-body mb-0" id="rawCell">等待查询…</pre></section>
</main>
<script>
(()=>{const $=id=>document.getElementById(id),set=(id,v)=>$(id).textContent=v||"未知";
const pause=ms=>new Promise(done=>setTimeout(done,ms));
const at=async c=>{const abort=new AbortController(),timer=setTimeout(()=>abort.abort(),7000);try{const r=await fetch("/cgi-bin/fm150_at?"+new URLSearchParams({atcmd:c}),{signal:abort.signal});const t=await r.text();if(!r.ok||/(^|\n)ERROR(?=$|\n|:)/.test(t))throw Error(t);return t}finally{clearTimeout(timer)}};
const safe=async c=>{for(let tryNo=0;tryNo<2;tryNo++){try{return await at(c)}catch(_){if(tryNo===0)await pause(1200)}}return""},cap=(t,r,d="未知")=>{const m=t.match(r);return m&&m[1]?m[1].trim():d};let busy=false;
async function refresh(){if(busy)return;busy=true;$("refresh").disabled=true;$("notice").textContent="正在读取 FM150 状态…";
const cpin=await safe("AT+CPIN?");set("simStatus",cpin.includes("+CPIN: READY")?"已就绪":cpin.includes("NOT INSERTED")?"无 SIM 卡":"未知");
const csqT=await safe("AT+CSQ"),csq=cap(csqT,/\+CSQ:\s*([0-9]+,[0-9]+)/);set("csq",csq);set("signal",csq==="99,99"?"NR5G":csq);
const pdp=await safe("AT+CGDCONT?");set("apn",cap(pdp,/\+CGDCONT:\s*\d+,"[^"]+","([^"]*)"/));
const addr=await safe("AT+CGPADDR"),ip=cap(addr,/\+CGPADDR:\s*\d+,"?([0-9.]+)"?/);set("ipv4",ip);set("connection",ip!=="未知"&&ip!=="0.0.0.0"?"已连接":"未连接");
const rat=await safe("AT+PSRAT?");set("rat",cap(rat,/\+PSRAT:\s*([^\r\n]+)/));
const cell=await safe("AT+GTCCINFO?");$("rawCell").textContent=cell||"未收到小区信息";const line=cell.match(/(?:^|\n)(\d+,\d+,\d{3},[^\r\n]+)/);
if(line){const f=line[1].split(","),plmn=f[2]+f[3],toDec=v=>/^[0-9A-F]+$/i.test(v)?String(parseInt(v,16)):v;set("mccmnc",plmn);set("cellType",cell.includes("NR service cell")?"NR 5G":cell.includes("LTE service cell")?"LTE 4G":"未知");set("tac",f[4]);set("cellId",toDec(f[6]));set("pci",toDec(f[7]));set("arfcn",f[8])}
const cops=await safe("AT+COPS?"),op=cap(cops,/\+COPS:\s*\d+,\d+,"([^"]+)"/),plmn=$("mccmnc").textContent,carrier={"46000":"中国移动","46002":"中国移动","46004":"中国移动","46007":"中国移动","46008":"中国移动","46001":"中国联通","46006":"中国联通","46009":"中国联通","46003":"中国电信","46005":"中国电信","46011":"中国电信","46015":"中国广电"};set("operator",/\?/.test(op)?(carrier[plmn]||plmn):op);
const temp=await safe("AT+MTSM=1,6"),deg=cap(temp,/\+MTSM:\s*(-?\d+(?:\.\d+)?)/,"");set("temperature",deg?deg+" °C":"-- °C");
try{const t=await fetch("/cgi-bin/get_uptime").then(r=>r.text());set("uptime",cap(t,/\bup\s+(.+?)(?:,\s+\d+\s+user|\s+load average|$)/i))}catch(_){}
$("updated").textContent="更新时间："+new Date().toLocaleString();$("notice").textContent="FM150 状态已更新。";$("refresh").disabled=false;busy=false}
$("refresh").onclick=refresh;refresh();setInterval(refresh,5000)})();
</script></body></html>
